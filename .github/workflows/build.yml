name: Build
on: [push, pull_request]
permissions:
  contents: read

jobs:
  build:
    name: Build package on ${{ matrix.dotnet-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: ["8.0.x", "9.0.x", "10.0.x"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Build
        run: dotnet build UsbBluetooth

      - name: Test
        run: dotnet test

      - name: Package
        run: dotnet pack UsbBluetooth -o dist

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: usbbluetooth_csharp_${{ matrix.dotnet-version }}
          path: dist/

  publish:
    name: Publish to NuGet
    needs: [build]
    if: contains(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: nuget
      url: https://www.nuget.org/packages/UsbBluetooth/
    permissions:
      id-token: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: usbbluetooth_csharp_10.0.x
        path: dist/

    - name: NuGet login
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      id: login
      with:
        user: ${{ secrets.NUGET_USER }}

    - name: NuGet push
      run: dotnet nuget push dist/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
